; PlatformIO project — open this folder in VS Code (not rover/ alone)
; Source lives in rover/ (same files as Arduino IDE sketch folder)

[platformio]
src_dir = rover

; Freenove ESP32 / generic ESP32 dev board (most common for the starter kit)
[env:freenove_esp32]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=0

; Uncomment and use instead if your board is ESP32-WROVER-KIT:
; [env:esp32wrover]
; platform = espressif32
; board = esp-wrover-kit
; framework = arduino
; monitor_speed = 115200
; upload_speed = 921600
