<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rover — Remote Control</title>
  <style>
    :root {
      --bg: #070b12;
      --bg-panel: rgba(12, 20, 34, 0.85);
      --border: rgba(0, 212, 255, 0.16);
      --text: #e8eef7;
      --muted: #6b7d96;
      --accent: #00d4ff;
      --green: #00e676;
      --red: #ff3d5a;
      --amber: #ffb020;
      --btn: #121c2c;
      --btn-hover: #1a2840;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 70% 30%, rgba(0, 212, 255, 0.06), transparent 65%);
      pointer-events: none;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 20px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .brand h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .brand p {
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 4px;
    }

    .conn {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.75rem;
      color: var(--muted);
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--bg-panel);
    }

    .conn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }

    .conn-dot.live {
      background: var(--green);
      box-shadow: 0 0 10px var(--green);
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      flex: 1;
      align-items: start;
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px;
      backdrop-filter: blur(10px);
    }

    .panel-title {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .awareness-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }

    .metric {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, 0.04);
    }

    .metric-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 4px;
    }

    .metric-value {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .fsm-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .pill {
      padding: 5px 11px;
      border-radius: 999px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      border: 1px solid transparent;
    }

    .pill.green { background: rgba(0, 230, 118, 0.12); color: var(--green); border-color: rgba(0, 230, 118, 0.35); }
    .pill.red { background: rgba(255, 61, 90, 0.12); color: var(--red); border-color: rgba(255, 61, 90, 0.35); }
    .pill.amber { background: rgba(255, 176, 32, 0.12); color: var(--amber); border-color: rgba(255, 176, 32, 0.35); }
    .pill.gray { background: rgba(107, 125, 150, 0.12); color: var(--muted); border-color: rgba(107, 125, 150, 0.3); }

    .mini-svg-wrap {
      display: flex;
      justify-content: center;
      padding: 8px 0 4px;
    }

    #mini-rover { width: 100%; max-width: 280px; height: auto; }

    .arc-mini { transition: stroke-dashoffset 0.25s ease, stroke 0.25s ease; }
    .rover-body { fill: #141e2e; stroke: var(--accent); stroke-width: 1.2; }
    .rover-core { fill: rgba(0, 212, 255, 0.18); }

    .dist-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .dist-chip {
      text-align: center;
      padding: 8px 4px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.22);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .dist-chip span:first-child {
      display: block;
      font-size: 0.6rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }

    .dist-chip span:last-child {
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .status-msg {
      margin-top: 12px;
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.72rem;
      color: var(--muted);
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      border-left: 3px solid var(--accent);
      min-height: 38px;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 88px);
      grid-template-rows: repeat(3, 88px);
      gap: 10px;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    .dpad-spacer { visibility: hidden; pointer-events: none; }

    .ctrl-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--btn-hover) 0%, var(--btn) 100%);
      color: var(--text);
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.08s ease, background 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
    }

    .ctrl-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
      opacity: 0.85;
    }

    .ctrl-btn:hover { border-color: rgba(0, 212, 255, 0.35); }

    .ctrl-btn:active,
    .ctrl-btn.active {
      transform: scale(0.94);
      background: linear-gradient(180deg, rgba(0, 212, 255, 0.25) 0%, rgba(0, 212, 255, 0.08) 100%);
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.25), inset 0 0 12px rgba(0, 212, 255, 0.12);
      color: var(--accent);
    }

    .ctrl-btn.stop-btn {
      border-radius: 50%;
      background: linear-gradient(180deg, #2a1520 0%, #1a0e14 100%);
      border-color: rgba(255, 61, 90, 0.35);
    }

    .ctrl-btn.stop-btn:active,
    .ctrl-btn.stop-btn.active {
      background: linear-gradient(180deg, rgba(255, 61, 90, 0.35) 0%, rgba(255, 61, 90, 0.12) 100%);
      border-color: var(--red);
      box-shadow: 0 0 20px rgba(255, 61, 90, 0.3);
      color: var(--red);
    }

    .ctrl-btn.forward-btn.warn {
      border-color: var(--red);
      color: var(--red);
      animation: fwd-pulse 0.75s ease-in-out infinite;
    }

    @keyframes fwd-pulse {
      0%, 100% {
        box-shadow: 0 0 8px rgba(255, 61, 90, 0.35);
        background: linear-gradient(180deg, #3a1520 0%, #1a0e14 100%);
      }
      50% {
        box-shadow: 0 0 24px rgba(255, 61, 90, 0.55);
        background: linear-gradient(180deg, #551828 0%, #2a1018 100%);
      }
    }

    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .hint kbd {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: ui-monospace, Consolas, monospace;
      font-size: 0.68rem;
      color: var(--text);
    }

    .error-banner {
      display: none;
      padding: 10px 14px;
      background: rgba(255, 61, 90, 0.1);
      border: 1px solid rgba(255, 61, 90, 0.35);
      border-radius: 10px;
      font-size: 0.8rem;
      color: var(--red);
    }

    .error-banner.show { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <h1>Remote Control</h1>
        <p>Manual drive · situational awareness</p>
      </div>
      <div class="conn">
        <span class="conn-dot" id="conn-dot"></span>
        <span id="conn-text">Connecting…</span>
      </div>
    </header>

    <div class="error-banner" id="error-banner"></div>

    <div class="layout">
      <section class="panel">
        <div class="panel-title">Telemetry</div>
        <div class="awareness-grid">
          <div class="metric">
            <div class="metric-label">Speed</div>
            <div class="metric-value" id="stat-speed">—</div>
          </div>
          <div class="metric">
            <div class="metric-label">Drive</div>
            <div class="metric-value" id="stat-drive">—</div>
          </div>
        </div>

        <div class="fsm-row">
          <span class="pill gray" id="pill-collision">collision —</span>
          <span class="pill gray" id="pill-navigation">nav —</span>
        </div>

        <div class="mini-svg-wrap">
          <svg id="mini-rover" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
            <path class="arc-mini" id="arc-front" fill="none" stroke="#00d4ff" stroke-width="10" stroke-linecap="round"
              d="M 110 58 A 100 100 0 0 1 210 58" stroke-dasharray="157" stroke-dashoffset="157"/>
            <path class="arc-mini" id="arc-left" fill="none" stroke="#00d4ff" stroke-width="10" stroke-linecap="round"
              d="M 58 110 A 100 100 0 0 0 58 210" stroke-dasharray="157" stroke-dashoffset="157"/>
            <path class="arc-mini" id="arc-right" fill="none" stroke="#00d4ff" stroke-width="10" stroke-linecap="round"
              d="M 262 110 A 100 100 0 0 1 262 210" stroke-dasharray="157" stroke-dashoffset="157"/>
            <rect class="rover-body" x="124" y="124" width="72" height="72" rx="12"/>
            <rect class="rover-core" x="134" y="134" width="52" height="52" rx="7"/>
          </svg>
        </div>

        <div class="dist-strip">
          <div class="dist-chip"><span>Front</span><span id="chip-front">—</span></div>
          <div class="dist-chip"><span>Left</span><span id="chip-left">—</span></div>
          <div class="dist-chip"><span>Right</span><span id="chip-right">—</span></div>
        </div>

        <div class="status-msg" id="status-msg">Waiting for telemetry…</div>
      </section>

      <section class="panel control-panel">
        <div class="panel-title">Drive controls</div>
        <div class="dpad" id="dpad">
          <div class="dpad-spacer"></div>
          <button type="button" class="ctrl-btn forward-btn" data-action="forward" id="btn-forward">
            <svg viewBox="0 0 24 24"><path d="M12 4l-8 8h5v8h6v-8h5z"/></svg>
            Forward
          </button>
          <div class="dpad-spacer"></div>

          <button type="button" class="ctrl-btn" data-action="left" id="btn-left">
            <svg viewBox="0 0 24 24"><path d="M14 6L6 12l8 6V6z"/></svg>
            Left
          </button>
          <button type="button" class="ctrl-btn stop-btn" data-action="stop" id="btn-stop">
            <svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
            Stop
          </button>
          <button type="button" class="ctrl-btn" data-action="right" id="btn-right">
            <svg viewBox="0 0 24 24"><path d="M10 6v12l8-6-8-6z"/></svg>
            Right
          </button>

          <div class="dpad-spacer"></div>
          <button type="button" class="ctrl-btn" data-action="reverse" id="btn-reverse">
            <svg viewBox="0 0 24 24"><path d="M12 20l8-8h-5V4h-6v8H4z"/></svg>
            Reverse
          </button>
          <div class="dpad-spacer"></div>
        </div>

        <p class="hint">
          <kbd>↑</kbd> forward · <kbd>↓</kbd> reverse · <kbd>←</kbd> left · <kbd>→</kbd> right · <kbd>Space</kbd> stop<br>
          Hold button or key to drive · release to stop
        </p>
      </section>
    </div>
  </div>

  <script>
    const API_BASE = "http://192.168.4.1";
    const POLL_MS = 300;
    const MAX_DIST = 100;
    const FRONT_WARN_CM = 30;

    const $ = (id) => document.getElementById(id);
    const buttons = {};
    document.querySelectorAll(".ctrl-btn[data-action]").forEach((btn) => {
      buttons[btn.dataset.action] = btn;
    });

    const keyMap = {
      ArrowUp: "forward",
      ArrowDown: "reverse",
      ArrowLeft: "left",
      ArrowRight: "right",
      " ": "stop"
    };

    let frontCm = 100;
    let failStreak = 0;
    let activeAction = null;
    const heldKeys = new Set();

    function distColor(cm) {
      if (cm < 25) return "#ff3d5a";
      if (cm < 40) return "#ffb020";
      if (cm < 70) return "#00d4ff";
      return "#00e676";
    }

    function fsmColor(kind, state) {
      if (kind === "collision") {
        if (state === "idle") return "green";
        if (state === "stop" || state === "evaluate") return "red";
        if (state === "turn" || state === "resume") return "amber";
      } else {
        if (state === "wander") return "green";
        if (state === "seek_wall" || state === "correct_left" || state === "correct_right") return "amber";
      }
      return "gray";
    }

    function setPill(el, prefix, state) {
      const kind = el.id.includes("collision") ? "collision" : "navigation";
      el.className = "pill " + fsmColor(kind, state);
      el.textContent = prefix + " " + (state || "—").replace(/_/g, " ");
    }

    function updateArc(pathEl, cm) {
      const len = 157;
      const ratio = Math.min(Math.max(cm / MAX_DIST, 0), 1);
      pathEl.setAttribute("stroke-dashoffset", (len * (1 - ratio)).toFixed(1));
      pathEl.setAttribute("stroke", distColor(cm));
    }

    function updateForwardWarn() {
      buttons.forward.classList.toggle("warn", frontCm < FRONT_WARN_CM);
    }

    function setConnection(ok, errMsg) {
      $("conn-dot").classList.toggle("live", ok);
      $("conn-text").textContent = ok ? "Live · 192.168.4.1" : "Offline";
      const banner = $("error-banner");
      if (!ok && errMsg) {
        banner.textContent = errMsg;
        banner.classList.add("show");
      } else {
        banner.classList.remove("show");
      }
    }

    function applyStatus(d) {
      frontCm = d.front_cm;
      $("stat-speed").textContent = d.speed;
      $("stat-drive").textContent = (d.drive || "—").replace(/_/g, " ").toUpperCase();
      setPill($("pill-collision"), "col", d.collision);
      setPill($("pill-navigation"), "nav", d.navigation);

      updateArc($("arc-front"), d.front_cm);
      updateArc($("arc-left"), d.left_cm);
      updateArc($("arc-right"), d.right_cm);

      ["front", "left", "right"].forEach((side) => {
        const cm = d[side + "_cm"];
        const el = $("chip-" + side);
        el.textContent = cm.toFixed(1);
        el.style.color = distColor(cm);
      });

      $("status-msg").textContent = d.message || "—";
      updateForwardWarn();
    }

    async function poll() {
      try {
        const res = await fetch(`${API_BASE}/status`, { cache: "no-store" });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        applyStatus(await res.json());
        failStreak = 0;
        setConnection(true);
      } catch (e) {
        failStreak++;
        if (failStreak >= 2) {
          setConnection(false, `Cannot reach rover — join Wi‑Fi AP RoverTelemetry (${API_BASE})`);
        }
      }
    }

    function sendCmd(action) {
      fetch(`${API_BASE}/cmd?action=${encodeURIComponent(action)}`, { cache: "no-store" }).catch(() => {});
    }

    function setActive(action) {
      if (activeAction === action) return;
      if (activeAction && buttons[activeAction]) {
        buttons[activeAction].classList.remove("active");
      }
      activeAction = action;
      if (action && buttons[action]) {
        buttons[action].classList.add("active");
      }
      if (action) sendCmd(action);
    }

    function bindControl(btn) {
      const action = btn.dataset.action;

      const press = (e) => {
        e.preventDefault();
        setActive(action);
      };

      const release = (e) => {
        e.preventDefault();
        if (action !== "stop") setActive("stop");
      };

      btn.addEventListener("mousedown", press);
      btn.addEventListener("mouseup", release);
      btn.addEventListener("mouseleave", () => {
        if (activeAction === action && action !== "stop") setActive("stop");
      });
      btn.addEventListener("touchstart", press, { passive: false });
      btn.addEventListener("touchend", release, { passive: false });
      btn.addEventListener("touchcancel", release, { passive: false });
    }

    Object.values(buttons).forEach(bindControl);

    window.addEventListener("keydown", (e) => {
      const action = keyMap[e.key];
      if (!action) return;
      e.preventDefault();
      if (heldKeys.has(e.key)) return;
      heldKeys.add(e.key);
      setActive(action);
    });

    window.addEventListener("keyup", (e) => {
      if (!keyMap[e.key]) return;
      e.preventDefault();
      heldKeys.delete(e.key);
      if (e.key === " ") {
        setActive("stop");
      } else if (activeAction === keyMap[e.key]) {
        setActive("stop");
      }
    });

    window.addEventListener("blur", () => {
      heldKeys.clear();
      setActive("stop");
    });

    poll();
    setInterval(poll, POLL_MS);
  </script>
</body>
</html>
