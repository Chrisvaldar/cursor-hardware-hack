<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rover Drive</title>
  <style>
    :root {
      --bg: #070b12;
      --panel: #121c2c;
      --border: rgba(0, 212, 255, 0.2);
      --text: #e8eef7;
      --muted: #6b7d96;
      --accent: #00d4ff;
      --green: #00e676;
      --red: #ff3d5a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    h1 { font-size: 1rem; letter-spacing: 0.08em; text-transform: uppercase; }
    .conn {
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--red);
    }
    .dot.live { background: var(--green); }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .status-line {
      font-family: Consolas, monospace;
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .status-line strong { color: var(--accent); }
    .dpad {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }
    .spacer { visibility: hidden; }
    button {
      border: 1px solid var(--border);
      background: #0d1524;
      color: var(--text);
      border-radius: 10px;
      padding: 16px 8px;
      font-size: 0.85rem;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
    }
    button:active, button.active {
      background: rgba(0, 212, 255, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    button.stop { color: var(--red); border-color: rgba(255, 61, 90, 0.4); }
    .hint {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 10px;
    }
    kbd {
      font-family: Consolas, monospace;
      font-size: 0.7rem;
      padding: 2px 5px;
      border-radius: 4px;
      border: 1px solid var(--border);
    }
    .banner {
      display: none;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 61, 90, 0.12);
      color: var(--red);
      font-size: 0.8rem;
    }
    .banner.show { display: block; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Rover</h1>
      <div class="conn"><span class="dot" id="dot"></span><span id="conn-text">Offline</span></div>
    </header>
    <div class="banner show" id="banner">Join Wi‑Fi <strong>RoverTelemetry</strong></div>

    <section class="panel">
      <div class="status-line">Dir <strong id="stat-dir">—</strong> · PWM <strong id="stat-speed">0</strong></div>
      <div class="status-line" id="stat-msg">—</div>

      <div class="dpad" id="dpad">
        <div class="spacer"></div>
        <button type="button" data-dir="up">Up</button>
        <div class="spacer"></div>
        <button type="button" data-dir="left">Left</button>
        <button type="button" class="stop" data-dir="stop">Stop</button>
        <button type="button" data-dir="right">Right</button>
        <div class="spacer"></div>
        <button type="button" data-dir="down">Down</button>
        <div class="spacer"></div>
      </div>

      <p class="hint">
        <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> drive · <kbd>Space</kbd> stop · hold to move<br>
        Low power firmware — if ESP resets, use a stronger 5 V supply.
      </p>
    </section>
  </div>

  <script>
    const API = "http://192.168.4.1";
    const DriveDir = Object.freeze({
      Stop: "stop", Up: "up", Down: "down", Left: "left", Right: "right",
    });

    const heldKeys = new Set();
    const heldDir = new Set();
    const buttons = {};
    let failStreak = 0;

    document.querySelectorAll("[data-dir]").forEach((btn) => {
      buttons[btn.dataset.dir] = btn;
    });

    function computeDir() {
      if (heldKeys.has(" ") || heldDir.has(DriveDir.Stop)) return DriveDir.Stop;
      const L = heldKeys.has("ArrowLeft") || heldDir.has(DriveDir.Left);
      const R = heldKeys.has("ArrowRight") || heldDir.has(DriveDir.Right);
      const U = heldKeys.has("ArrowUp") || heldDir.has(DriveDir.Up);
      const D = heldKeys.has("ArrowDown") || heldDir.has(DriveDir.Down);
      if (L && !R) return DriveDir.Left;
      if (R && !L) return DriveDir.Right;
      if (U && !D) return DriveDir.Up;
      if (D && !U) return DriveDir.Down;
      return DriveDir.Stop;
    }

    function highlight(dir) {
      Object.values(buttons).forEach((b) => b.classList.remove("active"));
      buttons[dir]?.classList.add("active");
    }

    function sendDrive(dir) {
      fetch(`${API}/cmd?dir=${dir}`, { cache: "no-store" }).catch(() => {});
      highlight(dir);
    }

    function refreshDrive() {
      sendDrive(computeDir());
    }

    async function poll() {
      try {
        const res = await fetch(`${API}/status`, { cache: "no-store" });
        if (!res.ok) throw new Error(res.status);
        const d = await res.json();
        document.getElementById("stat-dir").textContent = (d.dir || "—").toUpperCase();
        document.getElementById("stat-speed").textContent = d.speed ?? 0;
        document.getElementById("stat-msg").textContent = d.message || "—";
        failStreak = 0;
        document.getElementById("dot").classList.add("live");
        document.getElementById("conn-text").textContent = "Live";
        document.getElementById("banner").classList.remove("show");
      } catch {
        if (++failStreak >= 2) {
          document.getElementById("dot").classList.remove("live");
          document.getElementById("conn-text").textContent = "Offline";
          document.getElementById("banner").classList.add("show");
        }
      }
    }

    document.querySelectorAll("[data-dir]").forEach((btn) => {
      const dir = btn.dataset.dir;
      const down = (e) => {
        e.preventDefault();
        if (dir === DriveDir.Stop) { heldDir.clear(); heldDir.add(DriveDir.Stop); }
        else { heldDir.delete(DriveDir.Stop); heldDir.add(dir); }
        refreshDrive();
      };
      const up = (e) => { e.preventDefault(); heldDir.delete(dir); refreshDrive(); };
      btn.addEventListener("mousedown", down);
      btn.addEventListener("mouseup", up);
      btn.addEventListener("mouseleave", () => { if (heldDir.has(dir)) { heldDir.delete(dir); refreshDrive(); } });
      btn.addEventListener("touchstart", down, { passive: false });
      btn.addEventListener("touchend", up, { passive: false });
    });

    window.addEventListener("keydown", (e) => {
      if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) return;
      e.preventDefault();
      if (!heldKeys.has(e.key)) { heldKeys.add(e.key); refreshDrive(); }
    });
    window.addEventListener("keyup", (e) => {
      if (!["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(e.key)) return;
      e.preventDefault();
      heldKeys.delete(e.key);
      refreshDrive();
    });
    window.addEventListener("blur", () => {
      heldKeys.clear();
      heldDir.clear();
      sendDrive(DriveDir.Stop);
    });

    poll();
    setInterval(poll, 500);
    setInterval(() => { if (heldKeys.size || heldDir.size) refreshDrive(); }, 250);
  </script>
</body>
</html>
