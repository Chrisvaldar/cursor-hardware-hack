; Standalone servo test — open THIS folder in VS Code, or from repo root:
;   pio run -d servo_test -t upload
;   pio device monitor -d servo_test -b 115200

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
lib_deps = madhephaestus/ESP32Servo@^0.13.0

; Set your port if auto-detect fails (uncomment and edit):
; upload_port = COM8
; monitor_port = COM8
